services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: practice-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: suraj123
      POSTGRES_DB: trainee
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d trainee']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: practice-backend
    env_file:
      - ./backend/.env
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
